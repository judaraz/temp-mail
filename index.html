<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail44 - Temporary Email Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .api-status {
            padding: 10px 15px;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-radius: 8px;
            margin-bottom: 20px;
            color: #2e7d32;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }
        
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        button.danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        
        button.success {
            background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
        }
        
        button.info {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }
        
        .email-display {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px dashed #667eea;
        }
        
        .email-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .email-address {
            font-size: 28px;
            font-family: 'Courier New', monospace;
            color: #667eea;
            margin: 10px 0;
            word-break: break-all;
            font-weight: bold;
        }
        
        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .message-count {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .message-item {
            background: white;
            border: 2px solid #f0f0f0;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .message-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .message-item.unread {
            border-left: 4px solid #667eea;
            background: #f8f9ff;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .message-subject {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        
        .message-from {
            color: #666;
            font-size: 14px;
        }
        
        .message-time {
            color: #999;
            font-size: 12px;
        }
        
        .message-content {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: none;
        }
        
        .message-item.expanded .message-content {
            display: block;
        }
        
        .message-body {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            max-height: 400px;
            overflow-y: auto;
            word-break: break-word;
        }
        
        .attachment {
            display: inline-block;
            margin: 5px 5px 5px 0;
            padding: 8px 12px;
            background: #f0f0f0;
            border-radius: 8px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .attachment:hover {
            background: #e0e0e0;
        }
        
        .delete-message-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .domain-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .domain-item {
            padding: 10px;
            background: #f8f9ff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
        }
        
        .domain-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 5px;
            font-weight: 500;
        }
        
        .type-free {
            background: #4CAF50;
            color: white;
        }
        
        .type-premium {
            background: #FF9800;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            font-weight: 500;
        }
        
        @keyframes slideIn {
            from { 
                transform: translateX(100%);
                opacity: 0;
            }
            to { 
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .create-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .email-builder {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .email-builder input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .email-builder select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            min-width: 200px;
            cursor: pointer;
        }
        
        .email-builder select:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        
        .email-builder span {
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📧</span>
            TempMail44 Manager
        </h1>
        
        <div class="api-status" id="apiStatus">
            <span class="status-dot"></span>
            <span id="statusText">Loading domains...</span>
        </div>
        
        <div class="create-section">
            <h3>✨ Create New Email</h3>
            <div class="email-builder">
                <input type="text" id="emailName" placeholder="Username (optional)" pattern="[a-zA-Z0-9._-]+">
                <span>@</span>
                <select id="domainSelect" disabled>
                    <option value="">Loading domains...</option>
                </select>
                <button onclick="createCustomEmail()" class="success" id="createBtn">Create Email</button>
                <button onclick="createRandomEmail()" id="randomBtn">🎲 Random</button>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="fetchDomains()" class="success">🌐 Refresh Domains</button>
            <button onclick="checkMessages()" class="info">📨 Check Messages</button>
            <button onclick="refreshMessages()" class="info">🔄 Refresh</button>
            <button onclick="deleteEmail()" class="danger">🗑️ Delete Email</button>
        </div>
        
        <div class="email-display" id="emailDisplay" style="display: none;">
            <div class="email-header">
                <h3>📧 Current Email</h3>
                <button onclick="copyEmail()" class="success" style="padding: 8px 15px;">📋 Copy</button>
            </div>
            <div class="email-address" id="currentEmail"></div>
            <div id="emailInfo"></div>
        </div>
        
        <div class="domain-list" id="domainList" style="display: none;"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        
        <div class="messages-list">
            <div class="messages-header">
                <h3>📨 Inbox</h3>
                <span class="message-count" id="messageCount">0 messages</span>
            </div>
            <div id="messagesList"></div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // API Configuration
        const API_BASE = 'https://tempmail44.com/api';
        const API_KEY = 'SkJvIxz4zvie2sPd4x27AKuHcgDo2d';
        
        // State
        let currentEmail = localStorage.getItem('tempEmail');
        let emailData = JSON.parse(localStorage.getItem('tempEmailData') || 'null');
        let domains = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadDomains();
            if (currentEmail && emailData) {
                displayCurrentEmail();
                checkMessages();
            }
        });
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#f44336' : '#333';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        async function loadDomains() {
            const select = document.getElementById('domainSelect');
            const statusText = document.getElementById('statusText');
            
            try {
                statusText.textContent = 'Loading domains...';
                
                const response = await fetch(`${API_BASE}/domains/${API_KEY}/all`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Domains loaded:', data);
                
                if (data.status && data.data && data.data.domains) {
                    domains = data.data.domains;
                    
                    // Clear and populate select
                    select.innerHTML = '';
                    
                    // Filter free domains
                    const freeDomains = domains.filter(d => d.type === 'Free');
                    const premiumDomains = domains.filter(d => d.type === 'Premium');
                    
                    if (freeDomains.length > 0) {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = 'Free Domains';
                        freeDomains.forEach(domain => {
                            const option = document.createElement('option');
                            option.value = domain.domain;
                            option.textContent = domain.domain;
                            optgroup.appendChild(option);
                        });
                        select.appendChild(optgroup);
                    }
                    
                    if (premiumDomains.length > 0) {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = 'Premium Domains';
                        premiumDomains.forEach(domain => {
                            const option = document.createElement('option');
                            option.value = domain.domain;
                            option.textContent = domain.domain;
                            optgroup.appendChild(option);
                        });
                        select.appendChild(optgroup);
                    }
                    
                    // Enable select and set first option
                    select.disabled = false;
                    if (freeDomains.length > 0) {
                        select.value = freeDomains[0].domain;
                    }
                    
                    statusText.textContent = `✅ API Connected - ${domains.length} domains available`;
                    showToast(`Loaded ${domains.length} domains`);
                } else {
                    throw new Error('Invalid response format');
                }
            } catch (error) {
                console.error('Failed to load domains:', error);
                statusText.textContent = '❌ Failed to load domains';
                select.innerHTML = '<option value="">Failed to load domains</option>';
                showToast('Failed to load domains: ' + error.message, true);
            }
        }
        
        async function fetchDomains() {
            showLoading();
            await loadDomains();
            
            // Also display in the domain list
            try {
                const response = await fetch(`${API_BASE}/domains/${API_KEY}/all`);
                const data = await response.json();
                
                if (response.ok && data.status && data.data.domains) {
                    const domains = data.data.domains;
                    const domainList = document.getElementById('domainList');
                    
                    const freeDomains = domains.filter(d => d.type === 'Free');
                    const premiumDomains = domains.filter(d => d.type === 'Premium');
                    
                    let html = '<h3>Available Domains:</h3>';
                    
                    if (freeDomains.length > 0) {
                        html += '<h4 style="margin: 15px 0 10px 0; color: #4CAF50;">Free Domains</h4>';
                        freeDomains.forEach(domain => {
                            html += `<div class="domain-item">${domain.domain} <span class="domain-type type-free">FREE</span></div>`;
                        });
                    }
                    
                    if (premiumDomains.length > 0) {
                        html += '<h4 style="margin: 15px 0 10px 0; color: #FF9800;">Premium Domains</h4>';
                        premiumDomains.forEach(domain => {
                            html += `<div class="domain-item">${domain.domain} <span class="domain-type type-premium">PREMIUM</span></div>`;
                        });
                    }
                    
                    domainList.innerHTML = html;
                    domainList.style.display = 'grid';
                }
            } catch (error) {
                console.error('Error displaying domain list:', error);
            }
            
            hideLoading();
        }
        
        function generateRandomString(length = 10) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }
        
        async function createRandomEmail() {
            document.getElementById('emailName').value = generateRandomString(10);
            await createCustomEmail();
        }
        
        async function createCustomEmail() {
            const username = document.getElementById('emailName').value.trim().toLowerCase();
            const domain = document.getElementById('domainSelect').value;
            
            if (!domain) {
                showToast('Please select a domain or wait for domains to load', true);
                return;
            }
            
            const createBtn = document.getElementById('createBtn');
            const randomBtn = document.getElementById('randomBtn');
            
            createBtn.disabled = true;
            randomBtn.disabled = true;
            createBtn.textContent = 'Creating...';
            
            showLoading();
            
            try {
                // Step 1: Create email
                const createResponse = await fetch(`${API_BASE}/emails/${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!createResponse.ok) {
                    throw new Error(`HTTP error! status: ${createResponse.status}`);
                }
                
                const createData = await createResponse.json();
                console.log('Create response:', createData);
                
                if (!createData.status) {
                    throw new Error(createData.message || 'Failed to create email');
                }
                
                let finalData = createData.data;
                
                // Step 2: Update if username provided
                if (username) {
                    const currentEmail = finalData.email;
                    const updateUrl = `${API_BASE}/emails/${API_KEY}/${currentEmail}/${username}/${domain}`;
                    console.log('Update URL:', updateUrl);
                    
                    const updateResponse = await fetch(updateUrl, { method: 'POST' });
                    
                    if (updateResponse.ok) {
                        const updateData = await updateResponse.json();
                        console.log('Update response:', updateData);
                        
                        if (updateData.status) {
                            finalData = updateData.data;
                        }
                    }
                }
                
                emailData = finalData;
                currentEmail = finalData.email;
                
                localStorage.setItem('tempEmail', currentEmail);
                localStorage.setItem('tempEmailData', JSON.stringify(emailData));
                
                displayCurrentEmail();
                document.getElementById('emailName').value = '';
                showToast('✅ Email created successfully!');
                
                // Auto-check messages
                setTimeout(() => checkMessages(), 1000);
                
            } catch (error) {
                console.error('Create error:', error);
                showToast('Failed to create email: ' + error.message, true);
            } finally {
                createBtn.disabled = false;
                randomBtn.disabled = false;
                createBtn.textContent = 'Create Email';
                hideLoading();
            }
        }
        
        // Legacy create function for compatibility
        async function createEmail() {
            document.getElementById('emailName').value = '';
            await createCustomEmail();
        }
        
        function displayCurrentEmail() {
            const display = document.getElementById('emailDisplay');
            document.getElementById('currentEmail').textContent = currentEmail;
            
            const expireDate = emailData?.expire_at ? new Date(emailData.expire_at).toLocaleString() : 'Unknown';
            const createdDate = emailData?.created_at ? new Date(emailData.created_at).toLocaleString() : 'Unknown';
            
            document.getElementById('emailInfo').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px;">
                    <div><strong>⏰ Expires:</strong><br>${expireDate}</div>
                    <div><strong>📅 Created:</strong><br>${createdDate}</div>
                    <div><strong>🌐 Domain:</strong><br>${emailData?.domain || 'Unknown'}</div>
                    <div><strong>🔑 Token:</strong><br>${emailData?.email_token ? 'Available' : 'N/A'}</div>
                </div>
            `;
            display.style.display = 'block';
        }
        
        async function checkMessages() {
            if (!currentEmail) {
                showToast('Please create an email first', true);
                return;
            }
            
            showLoading();
            
            try {
                const url = `${API_BASE}/messages/${API_KEY}/${currentEmail}`;
                console.log('Checking messages:', url);
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Messages response:', data);
                
                if (data.status) {
                    const messages = data.messages || [];
                    displayMessages(messages);
                    document.getElementById('messageCount').textContent = `${messages.length} message${messages.length !== 1 ? 's' : ''}`;
                    
                    if (messages.length > 0) {
                        showToast(`📬 ${messages.length} message${messages.length !== 1 ? 's' : ''} found`);
                    }
                } else {
                    throw new Error(data.message || 'Failed to fetch messages');
                }
            } catch (error) {
                console.error('Check messages error:', error);
                showToast('Error: ' + error.message, true);
                
                document.getElementById('messagesList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>Failed to load messages</p>
                        <p style="font-size: 14px; margin-top: 10px;">${error.message}</p>
                        <button onclick="checkMessages()" style="margin-top: 15px;">Try Again</button>
                    </div>
                `;
            }
            
            hideLoading();
        }
        
        function displayMessages(messages) {
            const container = document.getElementById('messagesList');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No messages yet</p>
                        <p style="font-size: 14px; margin-top: 10px;">Messages will appear here automatically</p>
                    </div>
                `;
                return;
            }
            
            messages.sort((a, b) => new Date(b.receivedAt) - new Date(a.receivedAt));
            
            container.innerHTML = '';
            
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message-item ${!msg.is_seen ? 'unread' : ''}`;
                div.onclick = function(e) {
                    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
                    
                    this.classList.toggle('expanded');
                    if (this.classList.contains('expanded')) {
                        loadMessageContent(msg.id, this);
                    }
                };
                
                const date = msg.receivedAt ? new Date(msg.receivedAt).toLocaleString() : 'Unknown';
                
                div.innerHTML = `
                    <div class="message-header">
                        <span class="message-subject">
                            ${!msg.is_seen ? '🔵' : '📨'} ${msg.subject || 'No Subject'}
                        </span>
                        <span class="message-time">${date}</span>
                    </div>
                    <div class="message-from">
                        From: ${msg.from || 'Unknown'} ${msg.from_email ? `<${msg.from_email}>` : ''}
                    </div>
                    <div class="message-content" id="msg-${msg.id}">
                        <div style="text-align: center; padding: 20px;">
                            <div class="spinner" style="width: 30px; height: 30px;"></div>
                        </div>
                    </div>
                `;
                
                container.appendChild(div);
            });
        }
        
        async function loadMessageContent(messageId, element) {
            const contentDiv = element.querySelector(`#msg-${messageId}`);
            
            if (contentDiv.dataset.loaded) return;
            
            try {
                const response = await fetch(`${API_BASE}/messages/${API_KEY}/message/${messageId}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status && data.data) {
                    const msg = data.data;
                    let html = `<div class="message-body">`;
                    
                    if (msg.html) {
                        html += msg.content;
                    } else {
                        html += (msg.content || 'No content').replace(/\n/g, '<br>');
                    }
                    
                    html += '</div>';
                    
                    if (msg.attachments && msg.attachments.length > 0) {
                        html += '<div style="margin-top: 10px;"><strong>📎 Attachments:</strong><br>';
                        msg.attachments.forEach(att => {
                            html += `<a href="${att.url}" target="_blank" class="attachment">📎 ${att.name} (${(att.size / 1024).toFixed(2)} KB)</a>`;
                        });
                        html += '</div>';
                    }
                    
                    html += `<button class="delete-message-btn" onclick="deleteMessage('${messageId}', event)">🗑️ Delete Message</button>`;
                    
                    contentDiv.innerHTML = html;
                    contentDiv.dataset.loaded = 'true';
                } else {
                    throw new Error(data.message || 'Failed to load message');
                }
            } catch (error) {
                console.error('Load message error:', error);
                contentDiv.innerHTML = `<p style="color: #f44336;">Error: ${error.message}</p>`;
            }
        }
        
        async function deleteMessage(messageId, event) {
            event.stopPropagation();
            
            if (!confirm('Delete this message?')) return;
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/messages/${API_KEY}/message/${messageId}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok && data.status) {
                    showToast('✅ Message deleted');
                    await checkMessages();
                } else {
                    throw new Error(data.message || 'Failed to delete message');
                }
            } catch (error) {
                console.error('Delete message error:', error);
                showToast('Error: ' + error.message, true);
            }
            
            hideLoading();
        }
        
        async function refreshMessages() {
            await checkMessages();
        }
        
        async function deleteEmail() {
            if (!currentEmail) {
                showToast('No active email', true);
                return;
            }
            
            if (!confirm('Delete this email address? All messages will be lost.')) return;
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/emails/${API_KEY}/${currentEmail}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok && data.status) {
                    localStorage.removeItem('tempEmail');
                    localStorage.removeItem('tempEmailData');
                    currentEmail = null;
                    emailData = null;
                    
                    document.getElementById('emailDisplay').style.display = 'none';
                    document.getElementById('messagesList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>Email deleted</p>
                            <p style="font-size: 14px; margin-top: 10px;">Create a new email to continue</p>
                        </div>
                    `;
                    document.getElementById('messageCount').textContent = '0 messages';
                    
                    showToast('✅ Email deleted successfully');
                } else {
                    throw new Error(data.message || 'Failed to delete email');
                }
            } catch (error) {
                console.error('Delete email error:', error);
                showToast('Error: ' + error.message, true);
            }
            
            hideLoading();
        }
        
        function copyEmail() {
            if (!currentEmail) {
                showToast('No email to copy', true);
                return;
            }
            
            navigator.clipboard.writeText(currentEmail).then(() => {
                showToast('✅ Email copied to clipboard!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = currentEmail;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ Email copied to clipboard!');
            });
        }
    </script>
</body>
</html>
