<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TempMail44 • Telegram</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <style>
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #131837;
      --bg-card: #1a1f3a;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #2d3454;
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.5;
      padding: 12px;
      position: relative;
    }
    .app-container {
      max-width: 580px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: var(--radius-lg);
      padding: 22px 20px;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 1.7rem; font-weight: 700; }
    .header .subtitle { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
    .email-creator {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 18px;
      border: 1px solid var(--border);
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .input-group input {
      flex: 2;
      min-width: 150px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      outline: none;
    }
    .input-group input:focus { border-color: var(--accent); }
    .input-group select {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 13px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); background: var(--accent-hover); }
    .current-email {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .email-display { flex: 1; min-width: 0; }
    .email-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .email-address {
      font-weight: 700;
      font-size: 1.1rem;
      word-break: break-all;
      color: var(--accent);
    }
    .email-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-icon.danger:hover { background: var(--danger); border-color: var(--danger); }
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inbox-header h3 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .message-count {
      background: var(--accent);
      padding: 4px 13px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .messages-container { display: flex; flex-direction: column; gap: 10px; }
    .message-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      transition: 0.2s;
      animation: fadeSlide 0.2s ease;
      cursor: pointer;
    }
    .message-card:active { transform: scale(0.98); }
    .message-card.new-message { border-left: 4px solid var(--accent); }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .message-subject {
      font-weight: 600;
      font-size: 0.95rem;
      word-break: break-word;
      flex: 1;
      padding-right: 8px;
    }
    .message-date {
      font-size: 0.7rem;
      color: var(--text-secondary);
      white-space: nowrap;
      margin-left: 8px;
    }
    .new-indicator {
      background: var(--accent);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .message-from {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .message-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .btn-sm {
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .empty-state { text-align: center; padding: 35px 15px; color: var(--text-secondary); }
    .last-refresh { font-size: 0.7rem; color: var(--text-secondary); text-align: center; }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 500;
      z-index: 999;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      animation: toastAnim 2s ease forwards;
      pointer-events: none;
    }
    @keyframes toastAnim {
      0% { opacity: 0; top: 30px; }
      15% { opacity: 1; top: 20px; }
      85% { opacity: 1; top: 20px; }
      100% { opacity: 0; top: 10px; }
    }

    /* Modal - Instant open */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 560px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .modal-header h3 {
      font-size: 1.05rem;
      font-weight: 600;
      word-break: break-word;
      flex: 1;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      line-height: 1;
    }
    .modal-close:hover { background: var(--bg-card); color: white; }
    .modal-meta {
      padding: 10px 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }
    .modal-body {
      padding: 18px;
      overflow-y: auto;
      flex: 1;
      word-break: break-word;
      line-height: 1.7;
      max-height: 50vh;
      font-size: 0.9rem;
    }
    .modal-body pre {
      background: var(--bg-card);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .modal-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .loading-pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>📧 TempMail44</h1>
    <div class="subtitle">Telegram instant inbox</div>
  </div>

  <div class="email-creator">
    <div class="input-group">
      <input type="text" id="emailName" placeholder="Your username (optional)" maxlength="24">
      <select id="domainSelect"></select>
    </div>
    <button class="btn" id="createBtn" onclick="createEmail()">
      <span>📨</span> Create temporary email
    </button>
  </div>

  <div class="current-email" id="currentEmailBox" style="display: none;">
    <div class="email-display">
      <div class="email-label">Your active email</div>
      <div class="email-address" id="currentEmailText"></div>
    </div>
    <div class="email-actions">
      <button class="btn-icon" id="copyBtn" onclick="copyEmail()" title="Copy email">📋</button>
      <button class="btn-icon" id="refreshBtn" onclick="refreshInbox()" title="Refresh now">🔄</button>
      <button class="btn-icon danger" id="deleteEmailBtn" onclick="deleteEmailAccount()" title="Delete email">🗑️</button>
    </div>
  </div>

  <div class="inbox-header">
    <h3>📥 Inbox</h3>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div class="refresh-indicator" id="refreshStatus" style="display: none;">
        <div class="spinner"></div> syncing
      </div>
      <span class="message-count" id="messageCount">0</span>
    </div>
  </div>

  <div class="messages-container" id="messagesList">
    <div class="empty-state">📭<br>No emails yet</div>
  </div>
  <div class="last-refresh" id="lastRefresh"></div>
</div>

<!-- Message Viewer Modal -->
<div id="messageModal" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalSubject">Loading...</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody">
      <div style="text-align: center; padding: 30px; color: var(--text-secondary);">
        <div class="loading-pulse"></div> Loading...
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm btn-danger" id="modalDeleteBtn" onclick="deleteModalMessage()">🗑️ Delete</button>
      <button class="btn-sm btn-primary" onclick="closeModal()">✕ Close</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const API_BASE = 'https://tempmail44.com/api';
    const API_KEY = 'pTTUF8gTt48p6YcG5PzwiTtQZhQWKVE';
    
    let currentEmail = localStorage.getItem('tempEmail') || null;
    let pollTimer = null;
    let isPolling = false;
    let knownMessageIds = new Set();
    let currentViewingHash = null;
    // Store full message objects with content for instant viewing
    let messageCache = {}; // hash -> full message object

    function showToast(msg, isError = false) {
      const old = document.querySelector('.toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.background = isError ? '#ef4444' : '#10b981';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2100);
    }

    function escapeStr(text) {
      return String(text).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // Format date nicely
    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const d = new Date(dateStr);
        const now = new Date();
        const diffMs = now - d;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
      } catch (e) {
        return dateStr;
      }
    }

    function formatFullDate(dateStr) {
      if (!dateStr) return 'Unknown date';
      try {
        return new Date(dateStr).toLocaleString('en-US', {
          weekday: 'short',
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch (e) {
        return dateStr;
      }
    }

    // Modal functions
    window.closeModal = function() {
      document.getElementById('messageModal').style.display = 'none';
      currentViewingHash = null;
    };

    window.deleteModalMessage = async function() {
      if (!currentViewingHash || !currentEmail) return;
      if (!confirm('Delete this message?')) return;
      try {
        await fetch(`${API_BASE}/messages/${API_KEY}/${currentViewingHash}`, { method: 'DELETE' });
        knownMessageIds.delete(currentViewingHash);
        delete messageCache[currentViewingHash];
        showToast('Message deleted');
        closeModal();
        await checkMessages(true);
      } catch (err) {
        showToast('Delete failed', true);
      }
    };

    // INSTANT OPEN: Use cached data immediately, fetch fresh in background
    async function openMessageInModal(hash) {
      if (!hash) return;
      currentViewingHash = hash;
      const modal = document.getElementById('messageModal');
      const modalSubject = document.getElementById('modalSubject');
      const modalMeta = document.getElementById('modalMeta');
      const modalBody = document.getElementById('modalBody');
      
      // Show modal immediately
      modal.style.display = 'flex';
      
      // Check cache first for instant display
      const cached = messageCache[hash];
      if (cached && (cached.body || cached.text || cached.html || cached._fullContent)) {
        // INSTANT RENDER from cache
        displayMessageInModal(cached);
        console.log('⚡ Instant display from cache');
        
        // Still fetch fresh in background (silent update)
        fetchAndUpdateMessage(hash).catch(() => {});
        return;
      }
      
      // Show loading state
      modalSubject.textContent = 'Loading...';
      modalMeta.innerHTML = '';
      modalBody.innerHTML = '<div style="text-align: center; padding: 30px; color: var(--text-secondary);"><div class="loading-pulse"></div> Loading message...</div>';
      
      // Fetch message data
      const messageData = await fetchMessageData(hash);
      
      if (messageData) {
        // Cache it for next time
        messageCache[hash] = messageData;
        displayMessageInModal(messageData);
      } else {
        modalBody.innerHTML = `
          <div style="text-align: center; padding: 20px;">
            <p style="color: var(--danger); margin-bottom: 16px;">❌ Could not load message</p>
            <button class="btn-sm btn-primary" onclick="window.open('https://tempmail44.com/view/${hash}', '_blank')">
              🌐 Open in Browser
            </button>
          </div>
        `;
      }
    }
    
    // Silent background fetch to update cache
    async function fetchAndUpdateMessage(hash) {
      try {
        const data = await fetchMessageData(hash);
        if (data) {
          messageCache[hash] = data;
          // If still viewing same message, update display
          if (currentViewingHash === hash) {
            displayMessageInModal(data);
          }
        }
      } catch (e) {
        // Silent fail - cache is good enough
      }
    }
    
    async function fetchMessageData(hash) {
      // Method 1: API endpoint
      try {
        const res = await fetch(`${API_BASE}/messages/${API_KEY}/${hash}`, {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache' }
        });
        if (res.ok) {
          const data = await res.json();
          const msg = data.data || data.message || data;
          if (msg && (msg.body || msg.text || msg.html)) return msg;
        }
      } catch (e) {}
      
      // Method 2: Fallback POST
      try {
        const formData = new FormData();
        formData.append('email', currentEmail);
        formData.append('hash', hash);
        const res = await fetch('https://tempmail44.com/get_message', {
          method: 'POST', body: formData, cache: 'no-store'
        });
        if (res.ok) {
          const data = await res.json();
          const msg = data.message || data.data || data;
          if (msg && (msg.body || msg.text || msg.html)) return msg;
        }
      } catch (e) {}
      
      // Method 3: Find in full message list
      try {
        const allMessages = await fetchMessages();
        const found = allMessages.find(m => (m.hash || m.id) === hash);
        if (found) return found;
      } catch (e) {}
      
      return null;
    }
    
    function displayMessageInModal(message) {
      const modalSubject = document.getElementById('modalSubject');
      const modalMeta = document.getElementById('modalMeta');
      const modalBody = document.getElementById('modalBody');
      
      const subject = message.subject || 'No Subject';
      const from = message.from || message.from_email || 'Unknown';
      const to = message.to || currentEmail || '';
      const date = message.time || message.created_at || message.date || '';
      
      // Get body content
      const body = message.body || message.text || message.content || message._fullContent || '';
      const htmlBody = message.html || message.body_html || message.message_html || '';
      
      modalSubject.textContent = subject;
      modalMeta.innerHTML = `
        <span>👤 <strong>From:</strong> ${escapeStr(from)}</span>
        <span>📧 <strong>To:</strong> ${escapeStr(to)}</span>
        <span>🕒 <strong>Date:</strong> ${formatFullDate(date)}</span>
      `;
      
      // Render body
      if (htmlBody && htmlBody.trim().length > 0) {
        modalBody.innerHTML = htmlBody;
      } else if (body && body.trim().length > 0) {
        if (body.trim().startsWith('<') && body.includes('>')) {
          modalBody.innerHTML = body;
        } else {
          modalBody.innerHTML = `<pre style="white-space: pre-wrap; font-family: inherit; background: none; padding: 0; color: var(--text-primary);">${escapeStr(body)}</pre>`;
        }
      } else {
        modalBody.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">📭 This message has no content</p>';
      }
    }

    // Load domains
    async function loadDomains() {
      try {
        const res = await fetch(`${API_BASE}/domains/${API_KEY}/all`);
        const data = await res.json();
        const select = document.getElementById('domainSelect');
        select.innerHTML = '';
        if (data?.data?.domains) {
          data.data.domains.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.domain;
            opt.textContent = d.domain;
            select.appendChild(opt);
          });
        }
      } catch (e) {
        console.warn('Domain load failed');
      }
    }

    function showCurrentEmailBox(email) {
      document.getElementById('currentEmailText').textContent = email;
      document.getElementById('currentEmailBox').style.display = 'flex';
    }

    function hideCurrentEmailBox() {
      document.getElementById('currentEmailBox').style.display = 'none';
      document.getElementById('currentEmailText').textContent = '';
    }

    window.copyEmail = async function() {
      if (!currentEmail) return;
      try {
        await navigator.clipboard.writeText(currentEmail);
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅';
        showToast('Email copied!');
        setTimeout(() => { btn.textContent = '📋'; }, 1800);
      } catch (err) {
        const input = document.createElement('input');
        input.value = currentEmail;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('Copied');
      }
    };

    window.refreshInbox = async function() {
      if (!currentEmail) return;
      const refreshBtn = document.getElementById('refreshBtn');
      const statusEl = document.getElementById('refreshStatus');
      refreshBtn.style.transition = '0.3s';
      refreshBtn.style.transform = 'rotate(360deg)';
      statusEl.style.display = 'flex';
      
      knownMessageIds.clear();
      await checkMessages(true);
      
      setTimeout(() => {
        refreshBtn.style.transform = 'rotate(0deg)';
        statusEl.style.display = 'none';
      }, 500);
      updateLastRefreshTime();
    };

    function updateLastRefreshTime() {
      document.getElementById('lastRefresh').textContent = `Last check: ${new Date().toLocaleTimeString()}`;
    }

    window.deleteEmailAccount = async function() {
      if (!currentEmail) return;
      if (!confirm('Delete this temporary email? All messages will be lost.')) return;
      try {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        await fetch(`${API_BASE}/emails/${API_KEY}/${currentEmail}`, { method: 'DELETE' });
        currentEmail = null;
        localStorage.removeItem('tempEmail');
        knownMessageIds.clear();
        messageCache = {};
        hideCurrentEmailBox();
        document.getElementById('messagesList').innerHTML = '<div class="empty-state">📭 Email deleted</div>';
        document.getElementById('messageCount').textContent = '0';
        document.getElementById('lastRefresh').textContent = '';
        showToast('Email deleted');
      } catch (e) {
        showToast('Delete failed', true);
      }
    };

    window.createEmail = async function() {
      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Creating...';
      try {
        const res = await fetch(`${API_BASE}/emails/${API_KEY}`, { method: 'POST' });
        const data = await res.json();
        let email = data.data.email;
        const username = document.getElementById('emailName').value.trim();
        const domain = document.getElementById('domainSelect').value;
        if (username) {
          const updateRes = await fetch(`${API_BASE}/emails/${API_KEY}/${email}/${username}/${domain}`, { method: 'POST' });
          const updateData = await updateRes.json();
          if (updateData.data?.email) email = updateData.data.email;
        }
        currentEmail = email;
        localStorage.setItem('tempEmail', email);
        showCurrentEmailBox(email);
        document.getElementById('emailName').value = '';
        knownMessageIds.clear();
        messageCache = {};
        startPolling();
        showToast('Email ready!');
      } catch (e) {
        showToast('Creation failed', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>📨</span> Create temporary email';
      }
    };

    async function fetchMessages() {
      const url = `${API_BASE}/messages/${API_KEY}/${encodeURIComponent(currentEmail)}`;
      try {
        const res = await fetch(url, { cache: 'no-store', headers: {'Cache-Control': 'no-cache'} });
        if (res.ok) {
          const data = await res.json();
          if (data.status && Array.isArray(data.messages)) return data.messages;
        }
      } catch (e) {}
      
      try {
        const formData = new FormData();
        formData.append('email', currentEmail);
        const fallbackRes = await fetch('https://tempmail44.com/get_messages', {
          method: 'POST', body: formData, cache: 'no-store'
        });
        const fallbackData = await fallbackRes.json();
        return fallbackData.messages || fallbackData.data?.messages || [];
      } catch (e) {
        return [];
      }
    }

    async function checkMessages(forceRender = false) {
      if (!currentEmail || isPolling) return;
      isPolling = true;
      try {
        const messages = await fetchMessages();
        
        // Update cache with new messages
        messages.forEach(m => {
          const id = m.hash || m.id;
          if (id && !messageCache[id]) {
            messageCache[id] = m;
          }
        });
        
        document.getElementById('messageCount').textContent = messages.length;
        
        let newDetected = false;
        const currentIds = new Set();
        messages.forEach(m => {
          const id = m.hash || m.id || JSON.stringify(m);
          currentIds.add(id);
          if (!knownMessageIds.has(id)) newDetected = true;
        });
        knownMessageIds = currentIds;
        
        if (newDetected || forceRender) {
          renderMessages(messages, newDetected);
          if (newDetected) {
            showToast('📬 New message arrived!');
          }
        }
        if (messages.length === 0) {
          document.getElementById('messagesList').innerHTML = '<div class="empty-state">📭 Inbox empty</div>';
        }
      } catch (err) {
        console.error('checkMessages error', err);
      } finally {
        isPolling = false;
      }
    }

    function renderMessages(messages, highlightNew = false) {
      const container = document.getElementById('messagesList');
      if (!messages.length) {
        container.innerHTML = '<div class="empty-state">📭 No messages</div>';
        return;
      }
      container.innerHTML = '';
      
      // Sort by date (newest first)
      messages.sort((a, b) => {
        const dateA = new Date(a.time || a.created_at || 0);
        const dateB = new Date(b.time || b.created_at || 0);
        return dateB - dateA;
      });
      
      messages.forEach((m, idx) => {
        const id = m.hash || m.id || '';
        const isNewCard = highlightNew && !knownMessageIds.has(id);
        const card = document.createElement('div');
        card.className = 'message-card' + (isNewCard ? ' new-message' : '');
        card.style.animationDelay = `${idx * 0.02}s`;
        
        const subject = escapeStr(m.subject || 'No subject');
        const from = escapeStr(m.from || m.from_email || 'Unknown');
        const time = m.time || m.created_at || '';
        const displayDate = formatDate(time);
        
        card.innerHTML = `
          <div class="message-top">
            <span class="message-subject">${subject}</span>
            <span class="message-date">${displayDate}</span>
          </div>
          <div class="message-from">👤 ${from}</div>
          <div class="message-actions">
            <button class="btn-sm btn-primary view-msg-btn" data-hash="${escapeStr(id)}">📖 View</button>
            <button class="btn-sm btn-danger delete-msg-btn" data-hash="${escapeStr(id)}">🗑️ Delete</button>
          </div>
        `;
        
        // Click on card to view (except buttons)
        card.addEventListener('click', (e) => {
          if (!e.target.closest('button')) {
            openMessageInModal(id);
          }
        });
        
        container.appendChild(card);
      });
      
      // View buttons
      document.querySelectorAll('.view-msg-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const hash = btn.getAttribute('data-hash');
          if (hash) openMessageInModal(hash);
        });
      });
      
      // Delete buttons
      document.querySelectorAll('.delete-msg-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const hash = btn.getAttribute('data-hash');
          if (!hash || !currentEmail) return;
          if (!confirm('Delete this message?')) return;
          try {
            await fetch(`${API_BASE}/messages/${API_KEY}/${hash}`, { method: 'DELETE' });
            knownMessageIds.delete(hash);
            delete messageCache[hash];
            showToast('Message deleted');
            await checkMessages(true);
          } catch (err) {
            showToast('Delete failed', true);
          }
        });
      });
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      checkMessages(true);
      updateLastRefreshTime();
      pollTimer = setInterval(() => {
        if (currentEmail && !isPolling) {
          checkMessages();
          updateLastRefreshTime();
        }
      }, 8000);
    }

    // Modal close handlers
    document.getElementById('messageModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // Visibility handlers
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentEmail) {
        checkMessages(true);
        if (!pollTimer) startPolling();
      } else if (document.hidden && pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    });

    // Telegram Web App
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // Startup
    loadDomains();
    if (currentEmail) {
      showCurrentEmailBox(currentEmail);
      startPolling();
    } else {
      hideCurrentEmailBox();
    }
  })();
</script>
</body>
</html>
