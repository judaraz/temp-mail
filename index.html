<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TempMail44 • Telegram</title>
  <!-- Telegram Web App script -->
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <style>
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #131837;
      --bg-card: #1a1f3a;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #2d3454;
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.5;
      padding: 12px;
    }
    .app-container {
      max-width: 580px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: var(--radius-lg);
      padding: 22px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }
    .header h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header .subtitle {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    /* Creator */
    .email-creator {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 18px;
      border: 1px solid var(--border);
    }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .input-group input {
      flex: 2;
      min-width: 150px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      outline: none;
    }
    .input-group input:focus { border-color: var(--accent); }
    .input-group select {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 13px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); background: var(--accent-hover); }
    /* Current Email Card */
    .current-email {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .email-display {
      flex: 1;
      min-width: 0;
    }
    .email-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .email-address {
      font-weight: 700;
      font-size: 1.1rem;
      word-break: break-all;
      color: var(--accent);
    }
    .email-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-icon {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
      position: relative;
      background: var(--bg-card);
    }
    .btn-icon:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .btn-icon.danger:hover {
      background: var(--danger);
      border-color: var(--danger);
    }
    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--danger);
      color: white;
      border-radius: 12px;
      padding: 2px 7px;
      font-size: 0.7rem;
      font-weight: 700;
      min-width: 18px;
      text-align: center;
    }
    /* Inbox header */
    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inbox-header h3 {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .message-count {
      background: var(--accent);
      padding: 4px 13px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Messages */
    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 15px;
      transition: 0.2s;
      animation: fadeSlide 0.25s ease;
    }
    .message-card.new-message {
      border-left: 4px solid var(--accent);
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .message-subject {
      font-weight: 600;
      font-size: 1rem;
      word-break: break-word;
      padding-right: 8px;
    }
    .new-indicator {
      background: var(--accent);
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .message-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .message-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      flex-wrap: wrap;
    }
    .btn-sm {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }
    .empty-state {
      text-align: center;
      padding: 35px 15px;
      color: var(--text-secondary);
    }
    .last-refresh {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--success);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 500;
      z-index: 999;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      animation: toastAnim 2s ease forwards;
    }
    @keyframes toastAnim {
      0% { opacity: 0; top: 30px; }
      15% { opacity: 1; top: 20px; }
      85% { opacity: 1; top: 20px; }
      100% { opacity: 0; top: 10px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div>
      <h1>📧 TempMail44</h1>
      <div class="subtitle">Telegram instant inbox</div>
    </div>
  </div>

  <!-- Email creator -->
  <div class="email-creator">
    <div class="input-group">
      <input type="text" id="emailName" placeholder="Your username (optional)" maxlength="24">
      <select id="domainSelect"></select>
    </div>
    <button class="btn" id="createBtn" onclick="createEmail()">
      <span>📨</span> Create temporary email
    </button>
  </div>

  <!-- Current email box -->
  <div class="current-email" id="currentEmailBox" style="display: none;">
    <div class="email-display">
      <div class="email-label">Your active email</div>
      <div class="email-address" id="currentEmailText"></div>
    </div>
    <div class="email-actions">
      <button class="btn-icon" id="copyBtn" onclick="copyEmail()" title="Copy email">📋</button>
      <button class="btn-icon" id="refreshBtn" onclick="refreshInbox()" title="Refresh now">🔄</button>
      <button class="btn-icon danger" id="deleteEmailBtn" onclick="deleteEmailAccount()" title="Delete email">🗑️</button>
    </div>
  </div>

  <!-- Inbox -->
  <div class="inbox-header">
    <h3>📥 Inbox</h3>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div class="refresh-indicator" id="refreshStatus" style="display: none;">
        <div class="spinner"></div> syncing
      </div>
      <span class="message-count" id="messageCount">0</span>
    </div>
  </div>

  <div class="messages-container" id="messagesList">
    <div class="empty-state">📭<br>No emails yet</div>
  </div>
  <div class="last-refresh" id="lastRefresh"></div>
</div>

<script>
  (function() {
    const API_BASE = 'https://tempmail44.com/api';
    const API_KEY = 'pTTUF8gTt48p6YcG5PzwiTtQZhQWKVE';
    
    let currentEmail = localStorage.getItem('tempEmail') || null;
    let pollTimer = null;
    let isPolling = false;
    let knownMessageIds = new Set();

    // Toast
    function showToast(msg, isError = false) {
      const old = document.querySelector('.toast');
      if (old) old.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.style.background = isError ? '#ef4444' : '#10b981';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2100);
    }

    // Escape HTML
    function escapeStr(text) {
      return String(text).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // Load domains
    async function loadDomains() {
      try {
        const res = await fetch(`${API_BASE}/domains/${API_KEY}/all`);
        const data = await res.json();
        const select = document.getElementById('domainSelect');
        select.innerHTML = '';
        if (data?.data?.domains) {
          data.data.domains.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.domain;
            opt.textContent = d.domain;
            select.appendChild(opt);
          });
        }
      } catch (e) {
        console.warn('Domain load failed');
      }
    }

    // Update UI with current email
    function showCurrentEmailBox(email) {
      document.getElementById('currentEmailText').textContent = email;
      document.getElementById('currentEmailBox').style.display = 'flex';
    }

    function hideCurrentEmailBox() {
      document.getElementById('currentEmailBox').style.display = 'none';
      document.getElementById('currentEmailText').textContent = '';
    }

    // Copy to clipboard
    window.copyEmail = async function() {
      if (!currentEmail) return;
      try {
        await navigator.clipboard.writeText(currentEmail);
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅';
        showToast('Email copied!');
        setTimeout(() => { btn.textContent = '📋'; }, 1800);
      } catch (err) {
        const input = document.createElement('input');
        input.value = currentEmail;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        showToast('Copied (fallback)');
      }
    };

    // Refresh inbox manually
    window.refreshInbox = async function() {
      if (!currentEmail) return;
      const refreshBtn = document.getElementById('refreshBtn');
      const statusEl = document.getElementById('refreshStatus');
      refreshBtn.style.transform = 'rotate(0deg)';
      refreshBtn.style.transition = '0.3s';
      refreshBtn.style.transform = 'rotate(360deg)';
      statusEl.style.display = 'flex';
      
      knownMessageIds.clear();
      await checkMessages(true);
      
      setTimeout(() => {
        refreshBtn.style.transform = 'rotate(0deg)';
        statusEl.style.display = 'none';
      }, 500);
      updateLastRefreshTime();
    };

    function updateLastRefreshTime() {
      const now = new Date();
      document.getElementById('lastRefresh').textContent = `Last check: ${now.toLocaleTimeString()}`;
    }

    // Delete email account
    window.deleteEmailAccount = async function() {
      if (!currentEmail) return;
      if (!confirm('Delete this temporary email? All messages will be lost.')) return;
      try {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        await fetch(`${API_BASE}/emails/${API_KEY}/${currentEmail}`, { method: 'DELETE' });
        currentEmail = null;
        localStorage.removeItem('tempEmail');
        knownMessageIds.clear();
        hideCurrentEmailBox();
        document.getElementById('messagesList').innerHTML = '<div class="empty-state">📭 Email deleted</div>';
        document.getElementById('messageCount').textContent = '0';
        document.getElementById('lastRefresh').textContent = '';
        showToast('Email deleted');
      } catch (e) {
        showToast('Delete failed', true);
      }
    };

    // Create email
    window.createEmail = async function() {
      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Creating...';
      try {
        const res = await fetch(`${API_BASE}/emails/${API_KEY}`, { method: 'POST' });
        const data = await res.json();
        let email = data.data.email;
        const username = document.getElementById('emailName').value.trim();
        const domain = document.getElementById('domainSelect').value;
        if (username) {
          const updateRes = await fetch(`${API_BASE}/emails/${API_KEY}/${email}/${username}/${domain}`, { method: 'POST' });
          const updateData = await updateRes.json();
          if (updateData.data?.email) email = updateData.data.email;
        }
        currentEmail = email;
        localStorage.setItem('tempEmail', email);
        showCurrentEmailBox(email);
        document.getElementById('emailName').value = '';
        knownMessageIds.clear();
        startPolling();
        showToast('Email ready!');
      } catch (e) {
        showToast('Creation failed', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>📨</span> Create temporary email';
      }
    };

    // Fetch messages
    async function fetchMessages() {
      const url = `${API_BASE}/messages/${API_KEY}/${encodeURIComponent(currentEmail)}`;
      const res = await fetch(url, { cache: 'no-store', headers: {'Cache-Control': 'no-cache'} });
      if (res.ok) {
        const data = await res.json();
        if (data.status && Array.isArray(data.messages)) return data.messages;
      }
      // fallback
      const formData = new FormData();
      formData.append('email', currentEmail);
      const fallbackRes = await fetch('https://tempmail44.com/get_messages', {
        method: 'POST', body: formData, cache: 'no-store'
      });
      const fallbackData = await fallbackRes.json();
      return fallbackData.messages || fallbackData.data?.messages || [];
    }

    async function checkMessages(forceRender = false) {
      if (!currentEmail || isPolling) return;
      isPolling = true;
      try {
        const messages = await fetchMessages();
        document.getElementById('messageCount').textContent = messages.length;
        let newDetected = false;
        const currentIds = new Set();
        messages.forEach(m => {
          const id = m.hash || m.id || JSON.stringify(m);
          currentIds.add(id);
          if (!knownMessageIds.has(id)) newDetected = true;
        });
        knownMessageIds = currentIds;
        if (newDetected || forceRender) {
          renderMessages(messages, newDetected);
          if (newDetected) {
            showToast('📬 New message arrived!');
          }
        }
        if (messages.length === 0) {
          document.getElementById('messagesList').innerHTML = '<div class="empty-state">📭 Inbox empty</div>';
        }
      } catch (err) {
        console.error('checkMessages error', err);
      } finally {
        isPolling = false;
      }
    }

    function renderMessages(messages, highlightNew = false) {
      const container = document.getElementById('messagesList');
      if (!messages.length) {
        container.innerHTML = '<div class="empty-state">📭 No messages</div>';
        return;
      }
      container.innerHTML = '';
      messages.forEach((m, idx) => {
        const id = m.hash || m.id || '';
        const isNewCard = highlightNew && !knownMessageIds.has(id) ? true : false;
        const card = document.createElement('div');
        card.className = 'message-card' + (isNewCard ? ' new-message' : '');
        card.style.animationDelay = `${idx * 0.03}s`;
        const subject = escapeStr(m.subject || 'No subject');
        const from = escapeStr(m.from || m.from_email || 'Unknown');
        const time = m.time || m.created_at || '';
        const dateStr = time ? new Date(time).toLocaleString() : '';
        card.innerHTML = `
          <div class="message-header">
            <span class="message-subject">${subject}</span>
            ${isNewCard ? '<span class="new-indicator">NEW</span>' : ''}
          </div>
          <div class="message-meta">
            <span>👤 ${from}</span>
            ${dateStr ? `<span>🕒 ${dateStr}</span>` : ''}
          </div>
          <div class="message-actions">
            <button class="btn-sm btn-primary" data-hash="${escapeStr(id)}">📖 View</button>
            <button class="btn-sm btn-danger" data-hash="${escapeStr(id)}">🗑️ Delete</button>
          </div>
        `;
        container.appendChild(card);
      });
      // Attach events
      document.querySelectorAll('.btn-primary[data-hash]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const hash = e.currentTarget.getAttribute('data-hash');
          if (hash) window.open(`https://tempmail44.com/view/${hash}`, '_blank');
        });
      });
      document.querySelectorAll('.btn-danger[data-hash]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const hash = e.currentTarget.getAttribute('data-hash');
          if (!hash || !currentEmail) return;
          if (!confirm('Delete this message?')) return;
          try {
            await fetch(`${API_BASE}/messages/${API_KEY}/${hash}`, { method: 'DELETE' });
            knownMessageIds.delete(hash);
            showToast('Message deleted');
            await checkMessages(true);
          } catch (err) {
            showToast('Delete failed', true);
          }
        });
      });
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      checkMessages(true);
      updateLastRefreshTime();
      pollTimer = setInterval(() => {
        if (currentEmail && !isPolling) {
          checkMessages();
          updateLastRefreshTime();
        }
      }, 8000);
    }

    // Visibility / focus handlers for background refresh
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && currentEmail) {
        checkMessages(true);
        if (!pollTimer) startPolling();
      } else if (document.hidden && pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    });
    window.addEventListener('focus', () => {
      if (currentEmail && !pollTimer) startPolling();
    });

    // Init Telegram Web App
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    // Startup
    loadDomains();
    if (currentEmail) {
      showCurrentEmailBox(currentEmail);
      startPolling();
    } else {
      hideCurrentEmailBox();
    }
    console.log('📧 TempMail44 ready (Telegram native)');
  })();
</script>
</body>
</html>
