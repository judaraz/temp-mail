<script>
const API_BASE = 'https://tempmail44.com/api';
const API_KEY = 'pTTUF8gTt48p6YcG5PzwiTtQZhQWKVE';

let currentEmail = localStorage.getItem('tempEmail');
let emailData = JSON.parse(localStorage.getItem('tempEmailData') || 'null');
let pollInterval = null;
let isPolling = false;

/* =========================
   FIXED POLLING
========================= */
function startPolling() {
    if (pollInterval) clearInterval(pollInterval);

    checkMessages();

    pollInterval = setInterval(() => {
        if (currentEmail && !isPolling) {
            checkMessages();
        }
    }, 8000);

    document.getElementById('refreshIndicator').style.display = 'inline';
}

/* =========================
   🔥 FIXED MESSAGE FETCH
========================= */
async function checkMessages() {
    if (!currentEmail || isPolling) return;
    isPolling = true;

    try {
        console.log('Fetching messages for:', currentEmail);

        // ✅ MAIN API (correct way)
        const response = await fetch(
            `${API_BASE}/messages/${API_KEY}/${encodeURIComponent(currentEmail)}`
        );

        if (!response.ok) throw new Error('API failed');

        const data = await response.json();
        console.log('API response:', data);

        if (data.status && data.messages) {
            updateUI(data.messages);
            return;
        }

        throw new Error('No messages from API');

    } catch (error) {
        console.warn('API failed, trying fallback...', error);

        // ⚠️ fallback (your old endpoint but fixed)
        try {
            const formData = new FormData();
            formData.append('email', currentEmail);

            const fallback = await fetch('https://tempmail44.com/get_messages', {
                method: 'POST',
                body: formData
            });

            if (!fallback.ok) throw new Error('Fallback failed');

            const data = await fallback.json();
            console.log('Fallback response:', data);

            const messages = data.messages || data.data?.messages || [];
            updateUI(messages);

        } catch (err) {
            console.error('Both API & fallback failed:', err);
            updateUI([]);
        }

    } finally {
        isPolling = false;
    }
}

/* =========================
   UI UPDATE
========================= */
function updateUI(messages) {
    displayMessages(messages);

    document.getElementById('messageCount').textContent =
        `${messages.length} message${messages.length !== 1 ? 's' : ''}`;
}
