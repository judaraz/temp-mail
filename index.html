<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempMail44 - Temporary Email</title>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; background: #0f3460; border-radius: 20px; padding: 25px; }
h1 { color: #e94560; margin-bottom: 20px; }
.message-item { background: #1a1a2e; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
</style>
</head>

<body>

<div class="container">
<h1>📧 TempMail44</h1>

<input id="emailName" placeholder="username">
<select id="domainSelect"></select>
<button onclick="createEmail()">Create</button>

<h3 id="currentEmail"></h3>

<h3>Inbox (<span id="messageCount">0</span>)</h3>
<div id="messagesList"></div>
</div>

<script>
const API_BASE = 'https://tempmail44.com/api';
const API_KEY = 'pTTUF8gTt48p6YcG5PzwiTtQZhQWKVE';

let currentEmail = localStorage.getItem('tempEmail');
let pollInterval = null;
let isPolling = false;

/* LOAD DOMAINS */
async function loadDomains() {
    const res = await fetch(`${API_BASE}/domains/${API_KEY}/all`);
    const data = await res.json();

    const select = document.getElementById('domainSelect');
    select.innerHTML = '';

    data.data.domains.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.domain;
        opt.textContent = d.domain;
        select.appendChild(opt);
    });
}

/* CREATE EMAIL */
async function createEmail() {
    const username = document.getElementById('emailName').value;
    const domain = document.getElementById('domainSelect').value;

    const res = await fetch(`${API_BASE}/emails/${API_KEY}`, {
        method: 'POST'
    });

    const data = await res.json();
    let email = data.data.email;

    if (username) {
        const update = await fetch(
            `${API_BASE}/emails/${API_KEY}/${email}/${username}/${domain}`,
            { method: 'POST' }
        );
        const u = await update.json();
        email = u.data.email;
    }

    currentEmail = email;
    localStorage.setItem('tempEmail', email);

    document.getElementById('currentEmail').innerText = email;

    startPolling();
}

/* FIXED POLLING */
function startPolling() {
    if (pollInterval) clearInterval(pollInterval);

    checkMessages();

    pollInterval = setInterval(() => {
        if (currentEmail && !isPolling) {
            checkMessages();
        }
    }, 8000);
}

/* 🔥 FIXED MESSAGE FETCH */
async function checkMessages() {
    if (!currentEmail || isPolling) return;
    isPolling = true;

    try {
        console.log("Fetching via API...");

        const res = await fetch(
            `${API_BASE}/messages/${API_KEY}/${encodeURIComponent(currentEmail)}`
        );

        if (!res.ok) throw new Error("API failed");

        const data = await res.json();
        console.log("API:", data);

        if (data.status && data.messages) {
            renderMessages(data.messages);
            document.getElementById('messageCount').innerText = data.messages.length;
            return;
        }

        throw new Error("No messages");

    } catch (e) {
        console.warn("API failed, using fallback...");

        try {
            const formData = new FormData();
            formData.append('email', currentEmail);

            const fallback = await fetch('https://tempmail44.com/get_messages', {
                method: 'POST',
                body: formData
            });

            const data = await fallback.json();
            console.log("Fallback:", data);

            const messages = data.messages || data.data?.messages || [];
            renderMessages(messages);
            document.getElementById('messageCount').innerText = messages.length;

        } catch (err) {
            console.error("Fallback failed:", err);
            renderMessages([]);
            document.getElementById('messageCount').innerText = 0;
        }
    }

    isPolling = false;
}

/* RENDER */
function renderMessages(messages) {
    const box = document.getElementById('messagesList');
    box.innerHTML = '';

    if (!messages.length) {
        box.innerHTML = "<p>No messages</p>";
        return;
    }

    messages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'message-item';

        div.innerHTML = `
            <b>${m.subject || 'No subject'}</b><br>
            From: ${m.from_email || 'unknown'}<br>
            ${new Date(m.time || m.created_at).toLocaleString()}<br>
            <a href="https://tempmail44.com/view/${m.hash}" target="_blank">Open</a>
        `;

        box.appendChild(div);
    });
}

/* INIT */
window.onload = () => {
    loadDomains();

    if (currentEmail) {
        document.getElementById('currentEmail').innerText = currentEmail;
        startPolling();
    }
};
</script>

</body>
</html>
