<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TempMail44 MiniApp</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    padding: 20px;
}
.container {
    max-width: 800px;
    margin: auto;
}
input, select, button {
    padding: 10px;
    margin: 5px;
}
.email-box {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}
.message {
    background: #1e293b;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>📧 TempMail44 MiniApp</h2>

<div>
    <input type="text" id="emailName" placeholder="username">
    <select id="domainSelect"></select>
    <button onclick="createEmail()">Create</button>
</div>

<div class="email-box" id="emailBox" style="display:none;">
    <h3 id="currentEmail"></h3>
</div>

<h3>Inbox (<span id="count">0</span>)</h3>
<div id="messages"></div>

</div>

<script>
const API_BASE = "https://tempmail44.com/api";
const API_KEY = "pTTUF8gTt48p6YcG5PzwiTtQZhQWKVE";

let currentEmail = localStorage.getItem("email");
let pollInterval = null;
let isPolling = false;

/* LOAD DOMAINS */
async function loadDomains() {
    const res = await fetch(`${API_BASE}/domains/${API_KEY}/all`);
    const data = await res.json();

    const select = document.getElementById("domainSelect");
    select.innerHTML = "";

    data.data.domains.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d.domain;
        opt.textContent = d.domain;
        select.appendChild(opt);
    });
}

/* CREATE EMAIL */
async function createEmail() {
    const username = document.getElementById("emailName").value;
    const domain = document.getElementById("domainSelect").value;

    const res = await fetch(`${API_BASE}/emails/${API_KEY}`, {
        method: "POST"
    });

    const data = await res.json();
    let email = data.data.email;

    if (username) {
        const update = await fetch(
            `${API_BASE}/emails/${API_KEY}/${email}/${username}/${domain}`,
            { method: "POST" }
        );
        const u = await update.json();
        email = u.data.email;
    }

    currentEmail = email;
    localStorage.setItem("email", email);

    document.getElementById("emailBox").style.display = "block";
    document.getElementById("currentEmail").innerText = email;

    startPolling();
}

/* FETCH MESSAGES (FIXED) */
async function checkMessages() {
    if (!currentEmail || isPolling) return;
    isPolling = true;

    try {
        const res = await fetch(
            `${API_BASE}/messages/${API_KEY}/${encodeURIComponent(currentEmail)}`
        );

        const data = await res.json();
        console.log(data);

        if (data.status && data.messages) {
            renderMessages(data.messages);
            document.getElementById("count").innerText = data.messages.length;
        }

    } catch (e) {
        console.log("error", e);
    } finally {
        isPolling = false;
    }
}

/* RENDER */
function renderMessages(messages) {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    if (!messages.length) {
        box.innerHTML = "<p>No messages</p>";
        return;
    }

    messages.forEach(m => {
        const div = document.createElement("div");
        div.className = "message";

        div.innerHTML = `
            <b>${m.subject || "No subject"}</b><br>
            From: ${m.from_email || "unknown"}<br>
            Time: ${new Date(m.time).toLocaleString()}<br>
            <a href="https://tempmail44.com/view/${m.hash}" target="_blank">Open</a>
        `;

        box.appendChild(div);
    });
}

/* POLLING */
function startPolling() {
    if (pollInterval) clearInterval(pollInterval);

    checkMessages();

    pollInterval = setInterval(() => {
        if (!isPolling) checkMessages();
    }, 8000);
}

/* INIT */
window.onload = () => {
    loadDomains();

    if (currentEmail) {
        document.getElementById("emailBox").style.display = "block";
        document.getElementById("currentEmail").innerText = currentEmail;
        startPolling();
    }
};
</script>

</body>
</html>
